# ECC harness manifest — 全局启用组件清单 v9.0
# 权威: MANIFEST.yaml v9.0 | 五柱×五阶段×三横切

version: "9.0"
harness: claude-code-primary

phases:
  plan:
    { stage: ①规划, command: /discuss, pillar: superpowers, gate: HARD-GATE }
  spec:
    { stage: ②规格, command: /plan, pillar: openspec, gate: spec-validation }
  execute: { stage: ③执行, command: /execute, pillar: gsd, gate: build-pass }
  verify: { stage: ④验证, command: /verify, pillar: gstack, gate: quality-gate }
  learn:
    {
      stage: ⑤学习,
      command: /compact,
      pillar: claude_mem,
      gate: pattern-extracted,
    }

skills:
  p0:
    - using-superpowers
    - brainstorming
    - change-impact-analysis
    - verification-before-completion
    - systematic-debugging
  workflow:
    source: obra/superpowers
    enabled:
      - writing-plans
      - executing-plans
      - test-driven-development
      - subagent-driven-development
      - using-git-worktrees
      - receiving-code-review
      - requesting-code-review
      - finishing-a-development-branch
      - writing-skills
  extension:
    source: gstack + GSD + ECC
    enabled:
      - autoplan
      - browser-qa
      - design-pipeline
      - ship
      - office-hours
      - context-engineering
      - structured-artifacts
      - instinct-learning
      - workstream-management
      - adr-management
      - onboarding-guide
  meta:
    enabled:
      - memory-compression
      - spec-validation
      - karpathy-guidelines
      - caveman-compress
  mattpocock:
    source: mattpocock/skills
    enabled:
      - triage
      - improve-codebase-architecture
  insight:
    enabled: []
    note: "understand-anything removed v10.5; use codegraph + cbm"
  bridge:
    enabled:
      - claude-to-deerflow
      - taste-memory

agents:
  core:
    source: ECC + superpowers
    enabled:
      - planner
      - code-explorer
      - code-reviewer
      - build-error-resolver
      - architect
      - spec-reviewer
      - agentic-orchestrator
    note: context-manager 已合并至 claude-mem plugin
  gstack_review:
    source: garrytan/gstack
    enabled:
      - eng-reviewer
      - ceo-reviewer
      - designer
      - dx-reviewer
      - qa
      - security-reviewer
  gstack_supplement:
    source: garrytan/gstack
    version: "0.19"
    enabled:
      - cso
      - sre
      - release-engineer
      - product-manager
      - design-engineer
      - performance-engineer
      - doc-writer
  gstack_v019:
    source: garrytan/gstack
    version: "0.19"
    enabled:
      - codex-reviewer
      - ios-specialist
      - design-shotgun
      - pair-agent
      - land-and-deploy

hooks:
  profile_env: ECC_HOOK_PROFILE
  default: standard
  core:
    - session-start-bootstrap
    - pre-bash-guard
    - pre-rtk-rewrite
    - pre-tmux-reminder
    - pre-read-before-edit
    - pre-config-protection
    - pre-context-injector
    - pre-manifest-validator
    - pre-loop-guard
    - pre-suggest-compact
    - post-secret-detector
    - post-edit-format
    - post-codegraph-sync
    - post-operation-log
    - pre-compact-state
    - stop-quality-gate
    - stop-context-monitor
    - stop-pattern-extraction
    - stop-session-summary
    - stop-readme-updater
  _optional:
    - pre-dep-checker
    - pre-git-hook-bypass-block
    - post-edit-lint
    - post-test-runner
    - post-doc-reminder
    - stop-notify
    - stop-debug-checker
    - stop-daily-summary

commands:
  workflow:
    - discuss
    - plan
    - execute
    - verify
    - ship
    - review
    - compact
    - clear
    - status
    - office-hours
    - autoplan
    - workstream
    - adr
    - deep-research
  openspec:
    - propose
    - apply
    - archive

catalog:
  skills: catalog/skills/
  agents: catalog/agents/
  rules: catalog/rules/
  note: 按需复制到项目 .claude/，不全局加载

disabled_hooks:
  - pre-task-planner

mcp_loading:
  always: [memory, thinking, fs, fetch, time]
  dev: [gh, git, ctx7, pw, crawl, chrome-devtools, codegraph]
  ops: [redis, sqlite, docker, postgres]
  search: [brave, exa]
  design: [figma]
  optional: [puppeteer, glif]
  profile_env: CLAUDE_MCP_PROFILE

limits:
  global_agents_max: 25
  global_skills_max: 34
  global_rules_max: 10
