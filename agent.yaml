# ECC harness manifest — 全局启用组件清单
# 权威：.mcp.json | 详情：SPEC.md | 版本：2.1

version: "2.1"
harness: claude-code-primary

skills:
  workflow:
    source: obra/superpowers
    enabled:
      - using-superpowers
      - brainstorming
      - writing-plans
      - executing-plans
      - verification-before-completion
      - systematic-debugging
      - test-driven-development
      - subagent-driven-development
      - using-git-worktrees
      - receiving-code-review
      - requesting-code-review
      - finishing-a-development-branch
      - writing-skills
  extension:
    source: gstack + GSD-redux + ECC
    enabled:
      - autoplan
      - browser-qa
      - design-pipeline
      - ship
      - office-hours
      - context-engineering
      - structured-artifacts
      - instinct-learning
  meta:
    enabled:
      - memory-compression
      - spec-validation
      - karpathy-guidelines
      - caveman-compress

agents:
  core:
    source: ECC + superpowers
    enabled:
      - planner
      - code-explorer
      - code-reviewer
      - build-error-resolver
      - architect
      - spec-reviewer
      - context-manager
      - agentic-orchestrator
  gstack_review:
    source: garrytan/gstack
    enabled:
      - eng-reviewer
      - ceo-reviewer
      - designer
      - qa
      - security-reviewer
  gstack_supplement:
    source: garrytan/gstack
    enabled:
      - cso
      - sre
      - release-engineer
      - product-manager
      - design-engineer
      - performance-engineer
      - doc-writer

hooks:
  profile_env: ECC_HOOK_PROFILE
  default: standard
  core:
    - session-start-bootstrap
    - pre-bash-guard
    - pre-prompt-guard
    - pre-rtk-rewrite
    - post-secret-detector
    - stop-quality-gate
    - stop-pattern-extraction
    - pre-compact-state

commands:
  workflow:
    - discuss
    - plan
    - execute
    - verify
    - ship
    - review
    - compact
    - clear
    - status
    - office-hours
    - autoplan
  openspec:
    - propose
    - apply
    - archive

catalog:
  skills: catalog/skills/
  agents: catalog/agents/
  rules: catalog/rules/
  note: 按需复制到项目 .claude/，不全局加载
  gstack_agents:
    - eng-reviewer
    - ceo-reviewer
    - designer
    - qa
    - security

disabled_hooks:
  - pre-task-planner  # 互博 writing-plans，见 MANIFEST planning.excludes
