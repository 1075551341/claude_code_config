# 组件唯一归属源 — 防左右手互博 — v5.0
# 权威: .planning/phases/design-v5.md | 五柱×五阶段×三层

version: "5.0"
updated: "2026-05-27"

pillars:
  superpowers: { source: obra/superpowers, capabilities: [brainstorming, verification, debugging] }
  gsd: { source: gsd-build/get-shit-done, capabilities: [context-engineering, continuous-execution, read-before-edit] }
  openspec: { source: Fission-AI/OpenSpec, capabilities: [proposal-spec-tasks, spec-validation] }
  gstack: { source: garrytan/gstack, capabilities: [eng-review, ceo-review, design-review, qa-review, security-review] }
  claude_mem: { source: thedotmack/claude-mem, capabilities: [cross-session-memory, pattern-extraction] }

phases:
  plan:    { stage: ①规划, command: /discuss, pillar: superpowers, gate: HARD-GATE }
  spec:    { stage: ②规格, command: /plan, pillar: openspec, gate: spec-validation }
  execute: { stage: ③执行, command: /execute, pillar: gsd, gate: build-pass }
  verify:  { stage: ④验证, command: /verify, pillar: gstack, gate: quality-gate }
  learn:   { stage: ⑤学习, command: /compact, pillar: claude_mem, gate: pattern-extracted }

concerns:
  brainstorming:
    owner: skill/brainstorming
    source: obra/superpowers
    stage: plan
    excludes: [agent/planner]

  planning:
    owner: skill/writing-plans
    delegates: [agent/planner]
    command: plan
    source: obra/superpowers
    stage: spec
    excludes: [agent/agentic-orchestrator, hook/pre-task-planner]

  project_context:
    owner: hook/pre-context-injector
    note: 每会话缓存一次，注项目CLAUDE.md
    excludes: [hook/session-start-bootstrap]

  multi_agent:
    owner: agent/agentic-orchestrator
    skill: skill/subagent-driven-development
    source: affaan-m/ECC
    stage: execute
    excludes: [agent/planner]

  execution:
    owner: skill/executing-plans
    source: obra/superpowers
    stage: execute

  verification:
    owner: skill/verification-before-completion
    hook: stop-quality-gate
    source: obra/superpowers
    stage: verify

  debugging:
    owner: skill/systematic-debugging
    source: obra/superpowers
    stage: execute

  tdd:
    owner: skill/test-driven-development
    source: obra/superpowers
    stage: execute

  code_review_request:
    owner: skill/requesting-code-review
    source: obra/superpowers
    stage: verify

  code_review_receive:
    owner: skill/receiving-code-review
    delegates: [agent/code-reviewer]
    source: obra/superpowers
    stage: verify

  spec_review:
    owner: skill/spec-validation
    delegates: [agent/spec-reviewer]
    source: Fission-AI/OpenSpec
    stage: spec

  memory:
    owner: plugin/claude-mem
    skill: skill/memory-compression
    source: thedotmack/claude-mem
    stage: learn
    excludes: [agent/context-manager]

  context_retrieval:
    owner: plugin/claude-mem
    skill: skill/memory-compression
    source: thedotmack/claude-mem
    note: 检索/持久化由 claude-mem 统一负责，原 agent/context-manager 已合并

  context_rot:
    owner: skill/memory-compression
    hook: pre-compact-state
    source: GSD-redux
    stage: learn

  shell_token:
    owner: hook/pre-rtk-rewrite
    source: rtk-ai/rtk
    stage: execute
    excludes: [skill/caveman-compress]

  output_token:
    owner: skill/caveman-compress
    source: JuliusBrussee/caveman
    excludes: [hook/pre-rtk-rewrite]

  change_spec:
    owner: openspec/changes/
    command: propose
    source: Fission-AI/OpenSpec
    stage: spec
    excludes: [planning/phases]

  phase_planning:
    owner: planning/phases/
    source: GSD-redux
    stage: spec
    excludes: [openspec/changes]

  lite_spec:
    owner: spec/project/
    source: local
    stage: spec

  ui_token:
    owner: DESIGN.md
    skill: catalog/skills/ui-ux-pro-max
    source: VoltAgent/awesome-design-md
    stage: spec

  coding_philosophy:
    owner: skill/karpathy-guidelines
    rules_ref: rules/CORE.md
    source: forrestchang/andrej-karpathy-skills

  gsd_context:
    owner: skill/subagent-driven-development
    hooks: [pre-read-before-edit]
    rules_ref: rules/WORKFLOW.md
    source: GSD
    stage: execute

  gstack_review:
    owner: AGENTS.md
    catalog: [eng-reviewer, ceo-reviewer, designer, qa, security-reviewer]
    source: garrytan/gstack
    stage: verify
    delegates: [agent/code-reviewer, agent/spec-reviewer]

  gstack_eng:    { owner: agent/eng-reviewer, layer: skeleton, stage: verify }
  gstack_ceo:    { owner: agent/ceo-reviewer, layer: skeleton, stage: plan }
  gstack_designer: { owner: agent/designer, layer: skeleton, stage: spec }
  gstack_qa:     { owner: agent/qa, layer: skeleton, stage: verify }
  gstack_security: { owner: agent/security-reviewer, layer: skeleton, stage: verify }

  bestpractice:
    owner: rules/BESTPRACTICE.md
    layer: skeleton
    source: shanraisshan/best-practice

  memory_ssot:
    owner: plugin/claude-mem
    source: thedotmack/claude-mem
    stage: learn
    excludes: [memory/index.md]

  bootstrap:
    owner: hook/session-start-bootstrap
    skill: skill/using-superpowers
    source: obra/superpowers

  office_hours:
    owner: skill/office-hours
    delegates: [agent/product-manager]
    source: garrytan/gstack
    stage: plan

  autoplan:
    owner: skill/autoplan
    delegates: [agent/ceo-reviewer, agent/designer, agent/eng-reviewer]
    source: garrytan/gstack
    stage: verify

  ship_pipeline:
    owner: skill/ship
    delegates: [agent/release-engineer]
    source: garrytan/gstack
    excludes: [skill/finishing-a-development-branch]

  context_engineering:
    owner: rules/CONTEXT.md
    skill: skill/context-engineering
    source: GSD-redux

  manifest_validation:
    owner: hook/pre-manifest-validator
    source: local
    note: PreToolUse校验MANIFEST归属，防互博

  triage:
    owner: skill/triage
    source: mattpocock/skills
    excludes: [skill/systematic-debugging]
    stage: plan

  architecture_improvement:
    owner: skill/improve-codebase-architecture
    source: mattpocock/skills
    excludes: [skill/brainstorming, agent/code-reviewer]
    stage: execute

  instinct_v2:
    owner: skill/instinct-learning
    source: affaan-m/ECC
    stage: learn

  task_management:
    owner: skill/writing-plans
    source: eyaltoledano/claude-task-master
    template: templates/taskmaster/

  plugin_attribution:
    owner: MANIFEST.yaml
    note: 所有 plugin 必须在此注册 concern→owner，禁止 plugin 间功能重叠
    stage: skeleton

  deer_flow:
    owner: rules/WORKFLOW.md
    source: bytedance/deer-flow
    stage: execute
    note: DAG四阶段编排 + middleware chain，与 agent/agentic-orchestrator 互补
    excludes: [agent/planner]

  ci_claude_code_action:
    owner: templates/github-actions/
    source: anthropics/claude-code-action
    stage: ship
    note: CI模板引用，4后端 + 结构化JSON输出

  claude_context_mcp:
    owner: .mcp.json
    source: zilliztech/claude-context
    stage: execute
    note: optional 分组，启用条件见 rules/CONTEXT.md
    excludes: [agent/code-explorer]

p0_skills:
  - using-superpowers
  - brainstorming
  - verification-before-completion
  - systematic-debugging

global_skills_max: 28
global_agents_max: 22
