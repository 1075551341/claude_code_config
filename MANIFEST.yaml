# 组件唯一归属源 — 防左右手互博 — v10.0
# 权威: SPEC.md | 五柱×五阶段×三横切 | 27仓库全量整合 v10.1

# 防互博原则: 新 skill/agent 加入时必须声明 excludes 关系。无 excludes = 视为无冲突，事后发现互博 → 追溯补齐。

version: "10.3.1"
updated: "2026-06-26"

# ── v10 架构决策（访谈确认）────────────────────────────────────
ecc_integration: cherry_pick  # 吸收 ECC 2.0 模式，不安装 ECC 插件

superpowers:
  source: obra/superpowers
  version: "6.0.3"
  override: local_post_load  # 插件自动更新 + 本地 skills 后加载覆盖

openspec_config:
  source: Fission-AI/OpenSpec
  version: "1.4.1"
  profile: core  # v1.4.1: sync 已并入 core；verify/bulk-archive 见 openspec init + 本地 rules
  cli_required: true

thresholds:
  cursor: [70, 90]
  claude_code: [70, 90]
  gsd_logical_breakpoint: 70  # 任务边界/子Agent切换，非强制压缩

codegraph:
  policy: mandate_init
  scope: global_only  # ~/.claude 全局索引；业务项目按需 init
  note: "探索前须 codegraph init；validate_config V16 校验"

ruflo:
  status: reference_only
  note: "蜂群概念仅文档参考，不集成"

module_resolver:
  description: "ECC 2.0 cherry-pick — 声明不可共存模块"
  conflicts:
    - [deer_flow, workstream_management]
    - [shell_token, output_token]
    - [change_spec, phase_planning]
    - [plugin/compound-engineering, gstack_review]
    - [task_master_mcp, writing-plans]
    - [autoplan, brainstorming_design]
    - [triage, systematic_debugging]
    - [design_pipeline, brainstorming_ui]
    - [claude-mem:make-plan, writing-plans]
    - [claude-mem:do, executing-plans]
    - [claude-mem:smart-explore, codegraph_explore]
    - [feature-dev:code-architect, architect]
    - [feature-dev:code-explorer, code-explorer]
    - [feature-dev:code-reviewer, code-reviewer]
    - [deep_research, firecrawl_agent]
    - [land_and_deploy, release_engineer]
    - [agentic_orchestrator, pair_agent]
  hook_profile:
    env: LOCAL_HOOK_PROFILE
    values: [minimal, standard, strict]
    default: standard
    note: "映射本地 hook 子集，非 ECC 插件脚本"

pillars:
  superpowers:
    {
      source: obra/superpowers,
      version: "6.0.0",
      capabilities: [brainstorming, verification, debugging],
    }
  gsd:
    {
      source: open-gsd/gsd-core,
      version: "1.4.5",
      note: "原 gsd-build/get-shit-done 已归档；跟踪 v1.5.0-rc 仅文档",
      capabilities:
        [context-engineering, continuous-execution, read-before-edit],
    }
  openspec:
    {
      source: Fission-AI/OpenSpec,
      version: "1.4.1",
      capabilities: [proposal-spec-tasks, spec-validation],
    }
  gstack:
    {
      source: garrytan/gstack,
      version: "0.19",
      capabilities:
        [
          eng-review,
          ceo-review,
          design-review,
          qa-review,
          security-review,
          ios-specialist,
          codex-review,
          ml-defense,
          taste-learning,
          pair-agent,
          land-and-deploy,
          design-shotgun,
        ],
    }
  claude_mem:
    {
      source: thedotmack/claude-mem,
      version: "13.8.1",
      capabilities: [cross-session-memory, pattern-extraction],
    }

horizontal_layers:
  L1_governance:
    description: 治理横切层 — 防互博 + hook分级 + 编排
    owners:
      - source: affaan-m/ECC
        version: "2.0.0"
        concerns: [manifest-validation, hook-profile, loop-guard, selective-install]
      - source: bytedance/deer-flow
        version: "2.0"
        concerns: [LangGraph-orchestration, flash-standard-pro-ultra, claude-bridge]
  L2_optimization:
    description: 优化横切层 — Token压缩 + 上下文治理
    owners:
      - source: rtk-ai/rtk
        version: "0.41.0"
        concerns: [shell-compression, 60-90pct-savings]
      - source: JuliusBrussee/caveman
        version: "1.9.0"
        concerns: [output-compression, lite-full-ultra-wenyan]
      - source: internal
        concerns: [context-threshold-70-90, gsd-logical-breakpoint-70]
  L3_insight:
    description: 洞察横切层 — 代码图谱 + 知识图 + 外部搜索
    owners:
      - source: colbymchenry/codegraph
        version: "1.0.1"
        concerns: [pre-indexed-knowledge-graph, daemon-watchdog, config-redaction]
      - source: Lum1104/Understand-Anything
        version: "2.7.3"
        concerns: [interactive-knowledge-graph, guided-tour, 5-agent-pipeline]
      - source: Firecrawl/Exa
        concerns: [web-scraping, external-search]

loading_tiers:
  L0: [CLAUDE-ROUTER, CLAUDE.md, rules/CORE.md]
  L1: [skill/using-superpowers, skill/change-impact-analysis, skill/brainstorming]
  L2_gate:
    spec: [skill/writing-plans, skill/spec-validation]
    execute: [skill/executing-plans, skill/subagent-driven-development]
    verify: [skill/verification-before-completion]
    debug: [skill/systematic-debugging]
  L3_signal:
    - skill/deep-research
    - skill/adr-management
    - skill/workstream-management
    - skill/claude-to-deerflow
    - skill/git-workflow
    - skill/pr-workflow
    - skill/claude-mem-maintenance
  L3_dispatch: [agents/*, mcp/*, rules/* lazy globs]  # was L4, merged per v10.2 D4
  note: "Cursor: L2/L3 用 disable-model-invocation + 显式 Read；Claude Code: layer + using-superpowers 路由"

phases:
  plan:
    { stage: ①规划, command: /discuss, pillar: superpowers, gate: HARD-GATE }
  spec:
    { stage: ②规格, command: /plan, pillar: openspec, gate: spec-validation }
  execute: { stage: ③执行, command: /execute, pillar: gsd, gate: build-pass }
  verify: { stage: ④验证, command: /verify, pillar: gstack, gate: quality-gate }
  learn:
    {
      stage: ⑤学习,
      command: /compact,
      pillar: claude_mem,
      gate: pattern-extracted,
    }

concerns:
  brainstorming:
    owner: skill/brainstorming
    source: obra/superpowers
    stage: plan
    excludes: [agent/planner]

  planning:
    owner: skill/writing-plans
    delegates: [agent/planner]
    command: plan
    source: obra/superpowers
    stage: spec
    excludes: [agent/agentic-orchestrator, hook/pre-task-planner]
    depends_on: [skill/brainstorming]

  project_context:
    owner: hook/pre-context-injector
    note: 每会话缓存一次，注项目CLAUDE.md
    excludes: [hook/session-start-bootstrap]

  multi_agent:
    owner: agent/agentic-orchestrator
    skill: skill/subagent-driven-development
    source: affaan-m/ECC
    stage: execute
    excludes: [agent/planner]

  execution:
    owner: skill/executing-plans
    source: obra/superpowers
    stage: execute
    note: 仅 NON_SIMPLE 路径；简单任务(≤3文件)旁路 executing-plans/subagent-driven
    depends_on: [skill/writing-plans, skill/subagent-driven-development]

  verification:
    owner: skill/verification-before-completion
    hook: stop-quality-gate
    source: obra/superpowers
    stage: verify

  debugging:
    owner: skill/systematic-debugging
    source: obra/superpowers
    stage: execute
    depends_on: [rules/CORE.md]

  change_impact:
    owner: skill/change-impact-analysis
    source: local
    stage: execute
    note: 改前 codegraph_impact + Grep 全项目；改后残留引用检测
    depends_on: [rules/CORE.md]

  tdd:
    owner: skill/test-driven-development
    source: obra/superpowers
    stage: execute

  code_review_request:
    owner: skill/requesting-code-review
    source: obra/superpowers
    stage: verify

  code_review_receive:
    owner: skill/receiving-code-review
    delegates: [agent/code-reviewer]
    source: obra/superpowers
    stage: verify

  spec_review:
    owner: skill/spec-validation
    delegates: [agent/spec-reviewer]
    source: Fission-AI/OpenSpec
    stage: spec

  memory:
    owner: plugin/thedotmack
    skill: skill/memory-compression
    source: thedotmack/claude-mem
    stage: learn
    excludes: [agent/context-manager]
    depends_on: [skill/memory-compression]

  context_retrieval:
    owner: plugin/thedotmack
    skill: skill/memory-compression
    source: thedotmack/claude-mem
    note: 检索/持久化由 claude-mem 统一负责，原 agent/context-manager 已合并

  context_rot:
    owner: skill/memory-compression
    hook: pre-compact-state
    source: open-gsd/gsd-core
    stage: learn
    depends_on: [rules/CONTEXT.md, rules/CORE.md]

  shell_token:
    owner: hook/pre-rtk-rewrite
    source: rtk-ai/rtk
    stage: execute
    excludes: [skill/caveman-compress]

  output_token:
    owner: skill/caveman-compress
    source: JuliusBrussee/caveman
    excludes: [hook/pre-rtk-rewrite]

  change_spec:
    owner: openspec/changes/
    command: propose
    source: Fission-AI/OpenSpec
    stage: spec
    excludes: [planning/phases]
    depends_on: [skill/spec-validation]

  phase_planning:
    owner: planning/phases/
    source: open-gsd/gsd-core
    stage: spec
    excludes: [openspec/changes]

  lite_spec:
    owner: spec/project/
    source: local
    stage: spec

  ui_token:
    owner: rules/DESIGN.md
    skill: catalog/skills/ui-ux-pro-max
    source: VoltAgent/awesome-design-md
    stage: spec

  coding_philosophy:
    owner: skill/karpathy-guidelines
    rules_ref: rules/CORE.md
    source: forrestchang/andrej-karpathy-skills

  gsd_context:
    owner: skill/subagent-driven-development
    hooks: [pre-read-before-edit]
    rules_ref: rules/WORKFLOW.md
    source: open-gsd/gsd-core
    stage: execute
    depends_on: [rules/CONTEXT.md, rules/WORKFLOW.md]

  gstack_review:
    owner: rules/AGENTS.md
    catalog: [eng-reviewer, ceo-reviewer, designer, dx-reviewer, qa, security-reviewer]
    source: garrytan/gstack
    stage: verify
    delegates: [agent/code-reviewer, agent/spec-reviewer]
    depends_on: [agents/eng-reviewer, agents/ceo-reviewer, agents/designer, agents/dx-reviewer, rules/AGENTS.md]

  workstreams:
    owner: skill/workstream-management
    source: open-gsd/gsd-core
    stage: execute
    depends_on: [skill/using-git-worktrees, plugin/thedotmack, rules/WORKFLOW.md]

  adr:
    owner: skill/adr-management
    source: open-gsd/gsd-core
    stage: plan
    path: docs/ADR/
    depends_on: [skill/brainstorming]

  onboarding:
    owner: skill/onboarding-guide
    source: Fission-AI/OpenSpec
    stage: plan
    depends_on: [mcp/codegraph]

  openspec_rules:
    owner: rules/OPENSPEC.md
    source: Fission-AI/OpenSpec
    stage: spec
    depends_on: [skill/spec-validation]

  gstack_dx:
    owner: agent/dx-reviewer
    source: garrytan/gstack
    layer: skeleton
    stage: verify
    triggered_by: [ui-changes, ux-changes, new-features, api-design]

  codegraph_explore:
    owner: mcp/codegraph
    source: colbymchenry/codegraph
    stage: execute
    note: R17 — 代码探索首选，先于 Grep
    hooks: [post-codegraph-sync]

  context_monitor:
    owner: hook/stop-context-monitor
    source: affaan-m/ECC
    depends_on: [hook/pre-suggest-compact, rules/CORE.md]

  cursor_guard:
    owner: templates/cursor-guard
    source: local
    stage: execute
    note: "Cursor Guard v1.1 — sync/压缩/codegraph路由/shell/密钥/维护提示；~/.cursor 独立；低耦合 Claude"
    excludes: [hook/post-sync-on-edit, hook/post-codegraph-sync]
    depends_on: [scripts/sync.ps1]

  tmux_reminder:
    owner: hook/pre-tmux-reminder
    source: affaan-m/ECC
    note: ECC pre:bash:tmux-reminder — 长运行命令非tmux环境警告

  taste_memory:
    owner: skill/taste-memory
    source: garrytan/gstack
    stage: learn
    depends_on: [plugin/thedotmack]
    note: 通过 claude-mem observation 存设计偏好，不修改插件

  deer_flow_bridge:
    owner: skill/claude-to-deerflow
    source: bytedance/deer-flow
    stage: execute
    loading_tier: L3
    depends_on: [rules/WORKFLOW.md]
    excludes: [agent/planner, skill/workstream-management]

  deep_research:
    owner: skill/deep-research
    source: catalog/skills/deep-research
    stage: plan
    loading_tier: L3
    excludes: [firecrawl:firecrawl-agent]
    note: "deep-research = L3 结构化调研(Firecrawl+Exa+Context7)；firecrawl-agent = 非调研场景纯数据提取。场景互斥。"

  git_workflow:
    owner: skill/git-workflow
    source: user-rules-migration
    stage: ship
    loading_tier: L3
    note: User Rules 迁出；显式 commit 时 Read

  pr_workflow:
    owner: skill/pr-workflow
    source: user-rules-migration
    stage: ship
    loading_tier: L3
    note: User Rules 迁出；显式开 PR 时 Read

  claude_mem_maintenance:
    owner: skill/claude-mem-maintenance
    source: user-rules-migration
    stage: learn
    loading_tier: L3
    depends_on: [plugin/thedotmack]

  cursor_plugin_boundary:
    owner: config/MANIFEST.yaml
    note: Cursor 禁用 compound-engineering 插件；审查仅 ~/.claude/agents/ gstack 路由
    excludes: [plugin/compound-engineering/*]

  mcp_tiering:
    owner: config/.mcp.json
    note: Claude Code 常驻 5（codegraph+crawl+git+fs+time）；ops/optional-dev 见 mcp-configs/
    depends_on: [docs/CURSOR_MCP_PROFILE.md, docs/TOOL_MATCHING_GUIDE.md, rules/MCP.md]

  gstack_eng: { owner: agent/eng-reviewer, layer: skeleton, stage: verify }
  gstack_ceo: { owner: agent/ceo-reviewer, layer: skeleton, stage: plan }
  gstack_designer: { owner: agent/designer, layer: skeleton, stage: spec }
  gstack_qa: { owner: agent/qa, layer: skeleton, stage: verify }
  gstack_security:
    { owner: agent/security-reviewer, layer: skeleton, stage: verify }

  bestpractice:
    owner: rules/BESTPRACTICE.md
    layer: skeleton
    source: shanraisshan/best-practice

  memory_ssot:
    owner: plugin/thedotmack
    source: thedotmack/claude-mem
    stage: learn
    excludes: [memory/index.md]

  bootstrap:
    owner: hook/session-start-bootstrap
    skill: skill/using-superpowers
    source: obra/superpowers

  office_hours:
    owner: skill/office-hours
    delegates: [agent/product-manager]
    source: garrytan/gstack
    stage: plan

  autoplan:
    owner: skill/autoplan
    delegates: [agent/ceo-reviewer, agent/designer, agent/eng-reviewer]
    source: garrytan/gstack
    stage: verify
    excludes: [skill/brainstorming]
    note: "autoplan 仅用于审查后自动优化（CEO→Design→Eng→DX），不替代 brainstorming HARD-GATE。先 brainstorming 人机对话确定方向，autoplan 在 verify 阶段自动串联。"

  ship_pipeline:
    owner: skill/ship
    delegates: [agent/release-engineer]
    source: garrytan/gstack
    excludes: [skill/finishing-a-development-branch]

  context_engineering:
    owner: rules/CONTEXT.md
    skill: skill/context-engineering
    source: open-gsd/gsd-core
    depends_on: [rules/CORE.md, rules/WORKFLOW.md]

  manifest_validation:
    owner: hook/pre-manifest-validator
    source: local
    note: PreToolUse校验MANIFEST归属，防互博

  triage:
    owner: skill/triage
    source: mattpocock/skills
    excludes: [skill/systematic-debugging]
    stage: plan
    note: "triage = 未知Bug分类(P0-P3优先级)；systematic-debugging = 已知Bug根因分析。互斥不重叠。"

  architecture_improvement:
    owner: skill/improve-codebase-architecture
    source: mattpocock/skills
    excludes: [skill/brainstorming, agent/code-reviewer]
    stage: execute

  instinct_v2:
    owner: skill/instinct-learning
    source: affaan-m/ECC
    stage: learn

  task_management:
    owner: skill/writing-plans
    source: eyaltoledano/claude-task-master
    note: MCP 任务管理系统，core(7tools,~5K tokens)/standard(15,~10K)/all(36,~21K) 三级加载，按需启用
    template: templates/taskmaster/

  task_master_mcp:
    owner: config/.mcp.json
    source: eyaltoledano/claude-task-master
    stage: execute
    note: "可选MCP，安装: claude mcp add task-master-ai --env TASK_MASTER_TOOLS=\"core\" -- npx -y task-master-ai"
    excludes: [skill/writing-plans]

  plugin_attribution:
    owner: config/MANIFEST.yaml
    note: 所有 plugin 必须在此注册 concern→owner，禁止 plugin 间功能重叠
    stage: skeleton

  deer_flow:
    owner: rules/WORKFLOW.md
    source: bytedance/deer-flow
    version: "2.0"
    stage: execute
    note: LangGraph编排 + 9层Middleware + Sandbox隔离 + 子Agent(3并发/15min超时) + claude-to-deerflow bridge + flash/standard/pro/ultra四模式
    excludes: [agent/planner, skill/workstream-management]

  ruflo:
    owner: rules/WORKFLOW.md
    source: ruvnet/ruflo
    stage: execute
    note: reference_only — 蜂群拓扑概念仅文档参考，不深度集成
    status: reference_only

  gstack_ios:
    owner: agent/ios-specialist
    source: garrytan/gstack
    version: "0.19"
    stage: verify
    note: iOS 专用审查 (ios-qa/ios-fix/ios-design-review/ios-clean/ios-sync)

  gstack_codex:
    owner: agent/codex-reviewer
    source: garrytan/gstack
    version: "0.19"
    stage: verify
    note: Codex 跨模型独立审查，与 eng-reviewer 互补

  gstack_ml_defense:
    owner: rules/SECURITY.md
    source: garrytan/gstack
    version: "0.19"
    stage: verify
    note: 22MB 本地 ML 分类器 + canary tokens + Haiku 转录检查 三层注入防御

  ci_claude_code_action:
    owner: templates/github-actions/
    source: anthropics/claude-code-action
    stage: ship
    note: CI模板引用，4后端 + 结构化JSON输出

  claude_context_mcp:
    owner: config/.mcp.json
    source: zilliztech/claude-context
    stage: execute
    note: optional 分组，启用条件见 rules/CONTEXT.md
    excludes: [agent/code-explorer]

  design_pipeline:
    owner: skill/design-pipeline
    source: garrytan/gstack + VoltAgent/awesome-design-md
    stage: spec
    excludes: [skill/brainstorming]
    note: "brainstorming = 架构级设计决策；design-pipeline = UI/视觉级设计(shotgun→对比板→HTML)。不同层级，不互博。"

  gstack_learn:
    owner: rules/WORKFLOW.md
    source: garrytan/gstack
    stage: learn
    note: 跨会话学习管理，与 claude-mem 互补（项目级 vs 会话级）

  gstack_cso:
    owner: agent/cso
    source: garrytan/gstack
    stage: verify
    note: OWASP Top 10 + STRIDE 威胁模型，17 误报排除

  land_and_deploy:
    owner: agent/land-and-deploy
    source: garrytan/gstack
    stage: ship
    excludes: [agent/release-engineer]
    note: "land-and-deploy = 完整部署流程(approved PR→verified production)；release-engineer = 轻量发布。land-and-deploy 主。"

  agentic_orchestrator:
    owner: agent/agentic-orchestrator
    source: local
    stage: execute
    excludes: [agent/pair-agent]
    note: "agentic-orchestrator = 通用多Agent编排；pair-agent = 仅浏览器协作场景。agentic-orchestrator 主。"

  deer_dag:
    owner: rules/WORKFLOW.md
    source: bytedance/deer-flow
    stage: execute
    note: DAG四阶段（拆解→调度→整合→验证）+ 状态机

  claude_mem_search:
    owner: rules/CONTEXT.md
    source: thedotmack/claude-mem
    stage: execute
    note: search→timeline→get_observations 三层渐进式检索，~10x token 节省

  codegraph_mcp:
    owner: config/.mcp.json
    source: colbymchenry/codegraph
    stage: execute
    note: 预索引代码知识图谱 MCP，~35% token 节省，20+ 语言，按需启用

  understand_anything:
    owner: plugin/understand-anything
    skill: skill/understand-anything
    source: Lum1104/Understand-Anything
    stage: execute
    status: l3_on_demand  # v10.2: L3按需启用，显式 /understand-* 触发
    note: 交互式知识图 — 保留 skill 目录作 catalog，插件默认关闭
    excludes: [agent/code-explorer]

  code_exploration:
    owner: mcp/codegraph
    source: colbymchenry/codegraph
    stage: execute
    note: 预索引代码结构查询，替代Grep大量搜索
    excludes: [skill重复索引]

  concept_navigation:
    owner: plugin/understand-anything
    source: Lum1104/Understand-Anything
    stage: execute
    status: disabled
    note: 交互式概念导览+领域聚类，替代长文解释
    excludes: [skill重复导览]

  vibe_coding_cn:
    owner: catalog/skills/vibe-coding-cn
    source: 2025Emma/vibe-coding-cn
    stage: execute
    note: 道/法/术/器框架 + α(生成器)/Ω(优化器)元技能 + 五步协作流程

p0_skills:
  - using-superpowers
  - brainstorming
  - change-impact-analysis
  - verification-before-completion
  - systematic-debugging

global_skills_max: 38
global_agents_max: 25

# ═══════════════════════════════════════════════════════════════
# SuperAgent Forge — 动态知识库智能体锻造系统 (v1.0)
# 归属: .codeartsdoer/specs/superagent-forge/spec.md
# 文档: spec.md → design.md → tasks.md | Schema ×4 + 示例 ×2
# 引擎: .codeartsdoer/agents/superagent_forge/ (Python 12 模块)
# ═══════════════════════════════════════════════════════════════
superagent_forge:
  owner: specs/superagent-forge
  engine: agents/superagent_forge
  source: local
  stage: execute
  concerns:
    agent_definition: { owner: schema/agent-definition.yaml, source: local }
    knowledge_base: { owner: schema/knowledge-base.yaml, source: local }
    model_adapter: { owner: model_provider.py, source: local }
    tool_registry: { owner: tool_registry.py, source: local }
    dynamic_generation: { owner: agent_factory.py, source: local }
  examples:
    - ecommerce-cs-v1: "电商客服智能体"
    - industrial-kb-v1: "工业知识库智能体"
  platforms:
    - web: "FastAPI + Streamlit"
    - api: "REST API / SSE"
    - chrome-extension: "Chrome Extension (框架)"
  models:
    online: [openai, anthropic, deepseek]
    local: [ollama, lm-studio, llama-cpp]

# ── v10.3 sync 声明 ──────────────────────────────────────────
sync_targets:
  editors: [cursor, devin, qoder, qoder-cn, trae, trae-cn, codearts]
  method: symlink_first_copy_fallback
  script: scripts/sync.ps1
  modes: [default, -Skills, -All, -DryRun]
  # 全部为用户级配置（非项目级）；devin 使用 %APPDATA%\devin
  rules_ext:
    cursor: ".mdc"
    devin: ".md"
    qoder: ".mdc"
    qoder-cn: ".mdc"
    trae: ".md"
    trae-cn: ".md"
    codearts: ".mdc"
  root_filename:
    devin: "AGENTS.md"      # Devin CLI 全局 rules 标准
    default: "CLAUDE.md"    # 其余编辑器
